openapi: 3.1.0
info:
  title: 'CatchTable Page-Driven — Customer Credit-style Cards'
  version: 1.0.0
  description: |
    In-app **`cards`** collection: one wallet row per user (`type=wallet`, **`balanceKrw` + `balanceUsd`**)
    and stored-value card rows (`type=card`, `cardNumber`, `passCode`, same dual balances).
    **`customer_users`** stores **`ownedWalletId`**, `ownedCardIds`, and `linkedCardIds`.
    Append-only activity is **`wallet_transactions`**. Distinct from PSP `/me/payment-methods`.
paths:
  /me/cards:
    get: { $ref: '#/x-operations/ListMyCards' }
    post: { $ref: '#/x-operations/CreateOwnedCard' }
  /me/cards/transactions:
    get: { $ref: '#/x-operations/ListCardTransactions' }
  /me/cards:link-request:
    post: { $ref: '#/x-operations/RequestLinkByNumber' }
  /me/cards/{cardId}:
    get: { $ref: '#/x-operations/GetMyCard' }

x-operations:
  ListMyCards:
    tags: [Customer · Credit cards]
    operationId: listMyCards
    summary: List cards referenced from `ownedCardIds` and `linkedCardIds`.
    description: Never returns `passCode`. `cardNumber` may be masked per policy.
    responses:
      '200':
        description: Cards.
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas.yaml#/components/schemas/CardResponse' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }

  CreateOwnedCard:
    tags: [Customer · Credit cards]
    operationId: createOwnedCard
    summary: Create a `cards` row (`type=card`) and append its id to `ownedCardIds`.
    description: |
      Server assigns a unique `cardNumber`, persists `passCode` on the card document,
      initializes balances (e.g. zero). Returns a safe projection without `passCode`.
    parameters:
      - $ref: '../components/common.yaml#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [passCode]
            properties:
              passCode: { type: string, minLength: 4, maxLength: 12 }
    responses:
      '201':
        description: Created.
        content:
          application/json:
            schema:
              type: object
              required: [card]
              properties:
                card: { $ref: '../components/schemas.yaml#/components/schemas/CardResponse' }
                cardNumber:
                  type: string
                  description: Optional one-time plaintext number for the owner to save.
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }
      '422': { $ref: '../components/common.yaml#/components/responses/UnprocessableEntity' }

  GetMyCard:
    tags: [Customer · Credit cards]
    operationId: getMyCard
    summary: Fetch one card the caller owns or holds via `linkedCardIds`.
    parameters:
      - $ref: '../components/common.yaml#/components/parameters/CardIdPath'
    responses:
      '200':
        description: Card.
        content:
          application/json:
            schema: { $ref: '../components/schemas.yaml#/components/schemas/CardResponse' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../components/common.yaml#/components/responses/NotFound' }

  RequestLinkByNumber:
    tags: [Customer · Credit cards]
    operationId: requestLinkByNumber
    summary: Verify card number + passCode and attach a link for the current user (policy on `customer_users`).
    description: |
      On success, implementation updates link metadata / `linkedCardIds` as designed.
    parameters:
      - $ref: '../components/common.yaml#/components/parameters/IdempotencyKeyHeader'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [cardNumber, passCode]
            properties:
              cardNumber: { type: string }
              passCode: { type: string }
    responses:
      '202':
        description: Linked access granted or pending per product rules.
        content:
          application/json:
            schema:
              type: object
              required: [card]
              properties:
                card: { $ref: '../components/schemas.yaml#/components/schemas/CardResponse' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }
      '404': { $ref: '../components/common.yaml#/components/responses/NotFound' }
      '409': { $ref: '../components/common.yaml#/components/responses/Conflict' }

  ListCardTransactions:
    tags: [Customer · Credit cards]
    operationId: listCardTransactions
    summary: History for `cards` rows (`type=card`) the user owns or is linked to (`wallet_transactions`).
    parameters:
      - name: cardId
        in: query
        schema: { $ref: '../components/common.yaml#/components/schemas/ObjectId' }
      - $ref: '../components/common.yaml#/components/parameters/CursorQuery'
      - $ref: '../components/common.yaml#/components/parameters/LimitQuery'
    responses:
      '200':
        description: Transactions.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/common.yaml#/components/schemas/CursorPage'
                - type: object
                  properties:
                    data:
                      type: array
                      items: { $ref: '../components/schemas.yaml#/components/schemas/WalletTransaction' }
      '401': { $ref: '../components/common.yaml#/components/responses/Unauthenticated' }
